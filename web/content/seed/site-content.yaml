      title: "Konative | Manufacturer Representation in the Pacific Northwest"
      description: "Konative is a woman-owned manufacturer rep and marketing firm helping outdoor living, hardscape, surfaces, and fabrication brands grow through stronger territory coverage and dealer network performance across the Pacific Northwest."
    pages:
      home:
        title: "Expect More | Konative Pacific Northwest Manufacturer Representation"
        description: "Expect more from your Pacific Northwest manufacturer rep partner. Konative helps outdoor living, surfaces, and fabrication brands improve dealer network performance, territory coverage, and market execution."
      about:
        title: "About Konative | Woman-Owned Manufacturer Rep Firm in the PNW"
        description: "Learn how Konative combines premium brand stewardship, accountable territory management, and channel expertise to represent manufacturers across outdoor living, hardscape, surfaces, and fabrication."
      services:
        title: "Services | Territory Representation and Dealer Network Development"
        description: "Explore Konative services including territory representation, dealer network development, showroom positioning, fabrication channel support, and market activation for Pacific Northwest manufacturers."
      contact:
        title: "Partnership Inquiry | Contact Konative"
        description: "Start a partnership inquiry with Konative to discuss Pacific Northwest territory coverage, dealer network growth, and manufacturer representation strategy for outdoor living, surfaces, and fabrication products."
