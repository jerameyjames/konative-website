          - value: "3"
            label: "Territories Covered (WA, OR, ID)"
          - value: "18+"
            label: "Years in Manufacturer Representation"
          - value: "250+"
            label: "Dealer and Showroom Relationships"
      - blockType: three-card-grid
        sectionTitle: "How We Drive Territory Performance"
        cards:
          - title: "Territory Representation"
            description: "Konative acts as an extension of your sales organization in the Pacific Northwest, bringing disciplined field coverage and consistent market visibility. We turn scattered opportunities into focused territory momentum through structured dealer engagement and account planning."
