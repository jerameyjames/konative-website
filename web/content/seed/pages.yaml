            linkUrl: "/services"
          - title: "Channel Development"
            description: "We build and strengthen the dealer network with intentional onboarding, showroom strategy, and clear performance accountability. The result is better product placement, cleaner communication, and stronger sell-through across priority accounts."
            linkLabel: "Explore Channel Development"
            linkUrl: "/services"
          - title: "Market Activation"
            description: "Konative aligns manufacturer goals with local market execution through coordinated launches, education, and partner-facing messaging. We help hardscape, surfaces, and fabrication brands show up with clarity where buying decisions are made."
            linkLabel: "Explore Market Activation"
            linkUrl: "/services"
      - blockType: split-image-text
        heading: "Why Konative"
        body: "Konative combines senior manufacturer rep discipline with practical market intelligence specific to outdoor living, surfaces, and fabrication in the Pacific Northwest. We do more than open doors across a dealer network: we protect brand position, improve channel alignment, and create repeatable sales motion across each territory. Our clients value clear communication, accountable execution, and representation that treats every showroom, fabricator, and dealer relationship as long-term brand equity. That is why partners come to Konative when they expect more than coverage and need performance."
        ctaLabel: "Submit Partnership Inquiry"
        ctaLink: "/contact"
        imagePosition: "right"
        image: "[PLACEHOLDER_MEDIA_ID]"
      - blockType: cta-band
        heading: "Ready to expand your Pacific Northwest representation with a partner built for measurable channel growth"
        ctaLabel: "Start Partnership Inquiry"
        ctaLink: "/contact"
        style: "warm"

