name: Supabase security lint

# Fails on ERROR-level Database Linter findings for konative-intel.
# Add GitHub secret SUPABASE_ACCESS_TOKEN (Supabase account access token).

on:
  pull_request:
    paths:
      - 'web/supabase/**'
      - '.github/workflows/supabase-security-lint.yml'
      - 'scripts/check-supabase-security.sh'
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Supabase CLI
        run: npm exec --yes supabase@latest -- --version

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not set; skipping lint."
            exit 0
          fi
          npm exec --yes supabase@latest -- link --project-ref tcbworxmlmxoyzcvdjhh --yes

      - name: Database security lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [[ -z "$SUPABASE_ACCESS_TOKEN" ]]; then
            exit 0
          fi
          npm exec --yes supabase@latest -- db lint --linked --fail-on error
